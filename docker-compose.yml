version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/cropdoc_db
      - JWT_SECRET=change-this-to-a-long-random-secret-at-least-32-chars
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    depends_on:
      - mongo
    volumes:
      - model_cache:/root/.cache/torch
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
  model_cache:
